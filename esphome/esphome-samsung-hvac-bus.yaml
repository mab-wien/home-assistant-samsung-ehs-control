# ESPHome configuration for Samsung EHS heat pump HVAC bus
# v3: fixes Flow Temperature scaling, stabilizes Compressor Current, adds sanity filter for Main EEV1.
#
# Observations from your screenshot:
# - Flow Temperature shows ~420°C -> almost certainly raw value 420 = 42.0°C (0.1°C scaling)
# - Evaporator/Discharge temps are now correct after 0.1 scaling (25.5°C / 30.0°C)
# - Compressor Current became NA because the value was filtered out (likely 0 or out-of-range).
#   This version makes the filter more permissive and only drops obvious invalid values.
# - Main EEV1 is NOT a temperature; it's typically "steps" (0..~2000). Values like 270-300 are normal.

esphome:
  name: !secret name
  friendly_name: !secret name

esp32:
  board: m5stack-atom

web_server:
  port: 80

logger:
  logs:
    component: ERROR

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret wifi_hotspot_ssid
    password: !secret wifi_hotspot_password

captive_portal:

uart:
  tx_pin: GPIO19
  rx_pin: GPIO22
  baud_rate: 9600
  parity: EVEN

external_components:
  - source: github://omerfaruk-aran/esphome_samsung_hvac_bus@main
    components: [samsung_ac]

samsung_ac:
  non_nasa_keepalive: true
  debug_log_undefined_messages: false
  debug_log_messages: false

  devices:
    - address: "20.00.00"
      capabilities:
        horizontal_swing: false

      room_temperature:
        name: "temperature"
      target_temperature:
        name: "target temperature"
      water_temperature:
        name: "Warm water"
      water_outlet_target:
        name: "Water Outlet Target"
      water_target_temperature:
        name: "Hot Water Target Temperature"
      water_heater_mode:
        name: "Hotwater Mode"
      power:
        name: "power"
      water_heater_power:
        name: "Water Heater Power"
      mode:
        name: "mode"
      automatic_cleaning:
        name: "automatic clean"
      room_temperature_offset: -1.4

      custom_sensor:
        - name: Total Produced Energy
          id: total_produced_energy
          message: 0x4427
          device_class: energy
          state_class: total_increasing
          unit_of_measurement: kWh
          accuracy_decimals: 1
          filters:
            - multiply: 0.001

        - name: Current Produced Energy
          message: 0x4426
          id: instant_power_out
          device_class: power
          state_class: measurement
          unit_of_measurement: W
          accuracy_decimals: 1

    - address: "10.00.00"
      error_code:
        name: error_code

      outdoor_instantaneous_power:
        name: "Outdoor Instantaneous Power"
      outdoor_cumulative_energy:
        name: "Outdoor Cumulative Energy"
      outdoor_current:
        name: "Outdoor Current"
      outdoor_voltage:
        name: "Outdoor Voltage"
      outdoor_temperature:
        name: "Outdoor temperature"

      custom_sensor:
        - name: Total Consumed Energy
          id: total_consumed_energy
          message: 0x8414
          device_class: energy
          state_class: total_increasing
          unit_of_measurement: kWh
          accuracy_decimals: 1
          filters:
            - multiply: 0.001

        - name: Power consumption
          id: instant_power_in
          message: 0x8413
          device_class: power
          state_class: measurement
          unit_of_measurement: W

        - name: Compressor Frequency
          id: compressor_frequency
          message: 0x8238
          device_class: frequency
          state_class: measurement
          unit_of_measurement: Hz
          accuracy_decimals: 1

        - name: Target Compressor Frequency
          id: target_compressor_frequency
          message: 0x8237
          device_class: frequency
          state_class: measurement
          unit_of_measurement: Hz
          accuracy_decimals: 1

        - name: Fan Speed
          id: fan_speed_rpm
          message: 0x823D
          state_class: measurement
          unit_of_measurement: RPM
          accuracy_decimals: 1

        # FIX: raw value seems to be in 0.1°C steps (e.g. 420 -> 42.0°C)
        - name: Flow Temperature
          id: flow_temperature
          message: 0x82E0
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1
          filters:
            - multiply: 0.1
            - lambda: |-
                if (isnan(x) || x < -20.0 || x > 90.0) return NAN;
                return x;

        # EEV is typically "steps" (no decimal). Keep as-is, just sanity filter.
        - name: Main EEV1
          id: main_eev1
          message: 0x8229
          state_class: measurement
          accuracy_decimals: 0
          filters:
            - lambda: |-
                if (isnan(x) || x < 0.0 || x > 3000.0) return NAN;
                return x;

        - name: Operation Mode
          id: operation_mode
          message: 0x8001

        # Technician sensors (enabled)
        - name: Compressor Current
            message: 0x823B
            unit_of_measurement: "A"
            filters:
            - multiply: 0.005

        - name: Compressor Load
          id: compressor_load
          message: 0x8239
          unit_of_measurement: "%"
          state_class: measurement
          accuracy_decimals: 0
          filters:
            - lambda: |-
                if (isnan(x) || x < 0.0 || x > 100.0) return NAN;
                return x;

        - name: Compressor Discharge Temp
          id: discharge_temp
          message: 0x823C
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1
          filters:
            - multiply: 0.1
            - lambda: |-
                if (isnan(x) || x < -40.0 || x > 130.0) return NAN;
                return x;

        - name: Evaporator Temperature
          id: evaporator_temp
          message: 0x8234
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1
          filters:
            - multiply: 0.1
            - lambda: |-
                if (isnan(x) || x < -40.0 || x > 80.0) return NAN;
                return x;

        - name: Condenser Temperature
          id: condenser_temp
          message: 0x8235
          unit_of_measurement: "°C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1

sensor:
  - platform: template
    name: Total COP
    lambda: |-
      if (id(total_consumed_energy).state > 0) {
        return id(total_produced_energy).state / id(total_consumed_energy).state;
      } else {
        return 0;
      }
    update_interval: 300s
    accuracy_decimals: 2
    unit_of_measurement: 'COP'

  - platform: template
    name: Instant COP
    state_class: measurement
    lambda: |-
      if (id(instant_power_in).state > 0) {
        return id(instant_power_out).state / id(instant_power_in).state;
      } else {
        return 0;
      }
    update_interval: 30s
    accuracy_decimals: 2
