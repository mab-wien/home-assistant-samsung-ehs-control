# ESPHome configuration for Samsung EHS heat pump HVAC bus
# v4: adds confirmed technician registers from your logs + "night active" + silent inference
#
# Confirmed by your ESPHome logs:
# - Variable 823b = 561  -> Compressor current (needs scaling) ŅłĆfileciteŅłéturn5file5Ņłü
# - Variable 823f = 200  -> Main EEV step ŅłĆfileciteŅłéturn5file5Ņłü
# - Variable 8233 = 120  -> Control/State code ŅłĆfileciteŅłéturn5file10Ņłü
# - Variable 8236 = 38   -> Order/Command frequency (Hz) ŅłĆfileciteŅłéturn5file7Ņłü

esphome:
  name: !secret name
  friendly_name: !secret name

esp32:
  board: m5stack-atom
  # Optional (silence ESPHome notice):
  # framework:
  #   type: esp-idf

web_server:
  port: 80

logger:
  logs:
    component: ERROR

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret wifi_hotspot_ssid
    password: !secret wifi_hotspot_password

captive_portal:

# Needed for "Night active" / time-window sensors
time:
  - platform: homeassistant
    id: ha_time

uart:
  tx_pin: GPIO19
  rx_pin: GPIO22
  baud_rate: 9600
  parity: EVEN

external_components:
  - source: github://omerfaruk-aran/esphome_samsung_hvac_bus@main
    components: [samsung_ac]

samsung_ac:
  non_nasa_keepalive: true
  debug_log_undefined_messages: false
  debug_log_messages: false

  devices:
    # Indoor / Hydro unit
    - address: "20.00.00"
      capabilities:
        horizontal_swing: false

      room_temperature:
        name: "temperature"
      target_temperature:
        name: "target temperature"
      water_temperature:
        name: "Warm water"
      water_outlet_target:
        name: "Water Outlet Target"
      water_target_temperature:
        name: "Hot Water Target Temperature"
      water_heater_mode:
        name: "Hotwater Mode"
      power:
        name: "power"
      water_heater_power:
        name: "Water Heater Power"
      mode:
        name: "mode"
      automatic_cleaning:
        name: "automatic clean"

      room_temperature_offset: -1.4

      custom_sensor:
        - name: Total Produced Energy
          id: total_produced_energy
          message: 0x4427
          device_class: energy
          state_class: total_increasing
          unit_of_measurement: kWh
          accuracy_decimals: 1
          filters:
            - multiply: 0.001

        - name: Current Produced Energy
          message: 0x4426
          id: instant_power_out
          device_class: power
          state_class: measurement
          unit_of_measurement: W
          accuracy_decimals: 1

    # Outdoor unit
    - address: "10.00.00"
      error_code:
        name: error_code

      outdoor_instantaneous_power:
        name: "Outdoor Instantaneous Power"
      outdoor_cumulative_energy:
        name: "Outdoor Cumulative Energy"
      outdoor_current:
        name: "Outdoor Current"
      outdoor_voltage:
        name: "Outdoor Voltage"
      outdoor_temperature:
        name: "Outdoor temperature"

      custom_sensor:
        - name: Total Consumed Energy
          id: total_consumed_energy
          message: 0x8414
          device_class: energy
          state_class: total_increasing
          unit_of_measurement: kWh
          accuracy_decimals: 1
          filters:
            - multiply: 0.001

        - name: Power consumption
          id: instant_power_in
          message: 0x8413
          device_class: power
          state_class: measurement
          unit_of_measurement: W

        - name: Compressor Frequency
          id: compressor_frequency
          message: 0x8238
          device_class: frequency
          state_class: measurement
          unit_of_measurement: Hz
          accuracy_decimals: 1

        - name: Target Compressor Frequency
          id: target_compressor_frequency
          message: 0x8237
          device_class: frequency
          state_class: measurement
          unit_of_measurement: Hz
          accuracy_decimals: 1

        # CONFIRMED in log: 8236 appears as "order/command" frequency (Hz) ŅłĆfileciteŅłéturn5file7Ņłü
        - name: Order Compressor Frequency
          id: order_compressor_frequency
          message: 0x8236
          device_class: frequency
          state_class: measurement
          unit_of_measurement: Hz
          accuracy_decimals: 1

        - name: Fan Speed
          id: fan_speed_rpm
          message: 0x823D
          state_class: measurement
          unit_of_measurement: RPM
          accuracy_decimals: 0

        - name: Flow Temperature
          id: flow_temperature
          message: 0x82E0
          unit_of_measurement: "┬░C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1
          filters:
            - multiply: 0.1
            - lambda: |-
                if (isnan(x) || x < -20.0 || x > 90.0) return NAN;
                return x;

        # EEV opening/step (steps, no decimals)
        - name: Main EEV1
          id: main_eev1
          message: 0x8229
          state_class: measurement
          accuracy_decimals: 0
          filters:
            - lambda: |-
                if (isnan(x) || x < 0.0 || x > 3000.0) return NAN;
                return x;

        # CONFIRMED in log: 823F = 200 ŅłĆfileciteŅłéturn5file5Ņłü
        - name: Main EEV Step
          id: main_eev_step
          message: 0x823F
          state_class: measurement
          accuracy_decimals: 0
          filters:
            - lambda: |-
                if (isnan(x) || x < 0.0 || x > 5000.0) return NAN;
                return x;

        - name: Operation Mode
          id: operation_mode
          message: 0x8001

        # CONFIRMED in log: 8233 = 120 ŅłĆfileciteŅłéturn5file10Ņłü
        - name: Control State Code
          id: control_state_code
          message: 0x8233
          state_class: measurement
          accuracy_decimals: 0

        - name: Compressor Load
          id: compressor_load
          message: 0x8239
          unit_of_measurement: "%"
          state_class: measurement
          accuracy_decimals: 0
          filters:
            - lambda: |-
                if (isnan(x) || x < 0.0 || x > 100.0) return NAN;
                return x;

        - name: Compressor Discharge Temp
          id: discharge_temp
          message: 0x823C
          unit_of_measurement: "┬░C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1
          filters:
            - multiply: 0.1
            - lambda: |-
                if (isnan(x) || x < -40.0 || x > 130.0) return NAN;
                return x;

        - name: Evaporator Temperature
          id: evaporator_temp
          message: 0x8234
          unit_of_measurement: "┬░C"
          device_class: temperature
          state_class: measurement
          accuracy_decimals: 1
          filters:
            - multiply: 0.1
            - lambda: |-
                if (isnan(x) || x < -40.0 || x > 80.0) return NAN;
                return x;

        # Compressor current: CONFIRMED at 0x823B in your logs (raw 561) ŅłĆfileciteŅłéturn5file5Ņłü
        - name: Compressor Current
          id: compressor_current
          message: 0x823B
          unit_of_measurement: "A"
          state_class: measurement
          accuracy_decimals: 2
          filters:
            # raw/200 => A  (561 -> 2.805 A)
            - multiply: 0.005
            - lambda: |-
                if (isnan(x) || x <= 0.0 || x > 60.0) return NAN;
                return x;

sensor:
  - platform: template
    name: Total COP
    lambda: |-
      if (id(total_consumed_energy).state > 0) {
        return id(total_produced_energy).state / id(total_consumed_energy).state;
      } else {
        return 0;
      }
    update_interval: 300s
    accuracy_decimals: 2
    unit_of_measurement: 'COP'

  - platform: template
    name: Instant COP
    state_class: measurement
    lambda: |-
      if (id(instant_power_in).state > 0) {
        return id(instant_power_out).state / id(instant_power_in).state;
      } else {
        return 0;
      }
    update_interval: 30s
    accuracy_decimals: 2

binary_sensor:
  # Simple "night window" indicator (adjust hours if you want)
  - platform: template
    name: "Night Window Active (20-06)"
    lambda: |-
      auto now = id(ha_time).now();
      if (!now.is_valid()) return false;
      int h = now.hour;
      return (h >= 20) || (h < 6);

  # Silent/Quiet inference: typically fan rpm drops strongly (e.g., ~560 -> ~280 in your tests)
  - platform: template
    name: "Silent Active (Inferred)"
    lambda: |-
      if (isnan(id(fan_speed_rpm).state) || isnan(id(target_compressor_frequency).state)) return false;
      return (id(fan_speed_rpm).state <= 320) || (id(target_compressor_frequency).state <= 45);
